<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestor de Contenido - Simposio</title>
</head>
<body>
  <script src="https://identity.netlify.com/v1/netlify.js"></script>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on('init', function () {
        var hash = window.location.hash;
        var isIdentityCallback =
          hash.indexOf('invite_token=') !== -1 ||
          hash.indexOf('confirmation_token=') !== -1 ||
          hash.indexOf('recovery_token=') !== -1 ||
          hash.indexOf('access_token=') !== -1;

        if (isIdentityCallback) {
          window.netlifyIdentity.open();
        }
      });

      window.netlifyIdentity.on('login', function () {
        window.location.href = '/admin/';
      });
    }
  </script>
</body>
</html>
